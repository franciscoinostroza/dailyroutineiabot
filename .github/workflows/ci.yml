name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run tests
        env:
          TOKEN: "test"
          CHAT_ID: "test"
          OPENAI_KEY: "test"
          SHEET_ID: "test"
        run: pytest tests/ -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy types-pytz types-python-dotenv

      - name: Ruff check
        run: ruff check bot/ tests/ main.py --ignore E501,E402,F401,F841

      - name: MyPy type check
        run: mypy bot/ --ignore-missing-imports --no-strict-optional || true
